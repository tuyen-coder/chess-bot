<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc">
  <title id="title">AI Chess system overview</title>
  <desc id="desc">A diagram showing the browser, Python web server, chess engine, ML model, MySQL database, and Docker runtime.</desc>
  <rect width="1200" height="430" fill="#f7f4ed"/>
  <text x="70" y="70" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#1f2933">System Overview</text>
  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="70" y="130" width="190" height="110" rx="8" fill="#ffffff" stroke="#cfc7bb"/>
    <text x="165" y="176" font-size="22" font-weight="700" text-anchor="middle" fill="#1f2933">Browser UI</text>
    <text x="165" y="206" font-size="15" text-anchor="middle" fill="#52606d">board, replay, profile</text>

    <rect x="350" y="130" width="190" height="110" rx="8" fill="#ffffff" stroke="#cfc7bb"/>
    <text x="445" y="176" font-size="22" font-weight="700" text-anchor="middle" fill="#1f2933">Web API</text>
    <text x="445" y="206" font-size="15" text-anchor="middle" fill="#52606d">sessions and routes</text>

    <rect x="630" y="80" width="190" height="110" rx="8" fill="#ffffff" stroke="#cfc7bb"/>
    <text x="725" y="126" font-size="22" font-weight="700" text-anchor="middle" fill="#1f2933">Chess Engine</text>
    <text x="725" y="156" font-size="15" text-anchor="middle" fill="#52606d">legal moves and state</text>

    <rect x="630" y="240" width="190" height="110" rx="8" fill="#ffffff" stroke="#cfc7bb"/>
    <text x="725" y="286" font-size="22" font-weight="700" text-anchor="middle" fill="#1f2933">ML Agent</text>
    <text x="725" y="316" font-size="15" text-anchor="middle" fill="#52606d">MCTS and policy head</text>

    <rect x="910" y="130" width="190" height="110" rx="8" fill="#ffffff" stroke="#cfc7bb"/>
    <text x="1005" y="176" font-size="22" font-weight="700" text-anchor="middle" fill="#1f2933">MySQL</text>
    <text x="1005" y="206" font-size="15" text-anchor="middle" fill="#52606d">users, Elo, history</text>

    <path d="M260 185H350" stroke="#1f7a5a" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M540 170L630 135" stroke="#1f7a5a" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M540 200L630 290" stroke="#1f7a5a" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M820 185H910" stroke="#1f7a5a" stroke-width="4" marker-end="url(#arrow)"/>
    <rect x="430" y="370" width="340" height="36" rx="18" fill="#1f2933"/>
    <text x="600" y="394" font-size="16" font-weight="700" text-anchor="middle" fill="#ffffff">Docker Compose runs Web + MySQL together</text>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1f7a5a"/>
    </marker>
  </defs>
</svg>
