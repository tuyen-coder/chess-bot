services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 20

  web:
    build: .
    environment:
      WEB_HOST: 0.0.0.0
      WEB_PORT: 8000
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "8000:8000"
    volumes:
      - ./app/data/models:/app/app/data/models
    depends_on:
      db:
        condition: service_healthy

  trainer:
    build: .
    command: ["python3", "-m", "app.ml.train"]
    profiles:
      - trainer
    environment:
      TRAIN_GAMES: ${TRAIN_GAMES:-96}
      TRAIN_SIMULATIONS: ${TRAIN_SIMULATIONS:-200}
      TRAIN_EPOCHS: ${TRAIN_EPOCHS:-5}
      TRAIN_FORCE_RETRAIN: ${TRAIN_FORCE_RETRAIN:-0}
      TRAIN_RESUME: ${TRAIN_RESUME:-1}
      TRAIN_CHECKPOINT_PATH: /app/app/data/models/ml_model.pt
    volumes:
      - ./app/data/models:/app/app/data/models

volumes:
  mysql_data:
